name: Publish rune-notes-bin to AUR

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 */6 * * *"
  repository_dispatch:
    types:
      - rune-release-published
  workflow_dispatch:
    inputs:
      force_publish:
        description: "Build and publish even when the upstream hash is unchanged"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  UPSTREAM_REPO: ${{ vars.UPSTREAM_REPO || 'eggfriedrice24/rune' }}
  AUR_COMMIT_NAME: ${{ vars.AUR_COMMIT_NAME || 'rune-notes-ci' }}
  AUR_COMMIT_EMAIL: ${{ vars.AUR_COMMIT_EMAIL || 'rune-notes-ci@users.noreply.github.com' }}

jobs:
  publish:
    name: Check, build, and publish
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install tooling
        run: |
          set -euo pipefail
          pacman -Sy --noconfirm --needed git openssh rsync curl github-cli jq

      - name: Validate repository layout
        run: |
          set -euo pipefail
          test -f PKGBUILD
          test -f .SRCINFO
          test -f upstream.sha256
          test -f scripts/check_upstream.sh
          test -f scripts/update_pkgbuild.sh
          test -f scripts/publish_aur.sh

      - name: Check upstream release metadata
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          STATE_FILE: upstream.sha256
        run: |
          set -euo pipefail
          bash scripts/check_upstream.sh

      - name: Decide whether to publish
        id: decide
        env:
          CHANGED: ${{ steps.check.outputs.changed }}
          EVENT_NAME: ${{ github.event_name }}
          FORCE_PUBLISH: ${{ github.event.inputs.force_publish }}
        run: |
          set -euo pipefail
          should_publish=false
          if [[ "$CHANGED" == "true" || "$EVENT_NAME" == "push" || "$FORCE_PUBLISH" == "true" ]]; then
            should_publish=true
          fi
          echo "should_publish=$should_publish" >> "$GITHUB_OUTPUT"
          echo "should_publish=$should_publish"

      - name: Skip when no publish is needed
        if: steps.decide.outputs.should_publish != 'true'
        run: echo "No upstream change and no forced publish detected; nothing to do."

      - name: Update PKGBUILD and upstream state
        if: steps.check.outputs.changed == 'true'
        id: update
        env:
          PKGBUILD_PATH: PKGBUILD
          STATE_FILE: upstream.sha256
          PKGVER_CANDIDATE: ${{ steps.check.outputs.pkgver_candidate }}
          ASSET_SHA256: ${{ steps.check.outputs.asset_sha256 }}
        run: |
          set -euo pipefail
          bash scripts/update_pkgbuild.sh

      - name: Create non-root build user
        if: steps.decide.outputs.should_publish == 'true'
        run: |
          set -euo pipefail
          useradd -m builder
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Regenerate .SRCINFO
        if: steps.decide.outputs.should_publish == 'true'
        run: |
          set -euo pipefail
          su - builder -c "cd '$GITHUB_WORKSPACE' && makepkg --printsrcinfo > .SRCINFO"

      - name: Build package
        if: steps.decide.outputs.should_publish == 'true'
        run: |
          set -euo pipefail
          su - builder -c "cd '$GITHUB_WORKSPACE' && makepkg -f --nodeps --noconfirm"

      - name: Upload build artifact
        if: steps.decide.outputs.should_publish == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: rune-notes-bin-package
          if-no-files-found: error
          path: "*.pkg.tar.zst"

      - name: Publish package files to AUR
        if: steps.decide.outputs.should_publish == 'true'
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          AUR_GIT_URL: ssh://aur@aur.archlinux.org/rune-notes-bin.git
          AUR_BRANCH: master
          AUR_COMMIT_NAME: ${{ env.AUR_COMMIT_NAME }}
          AUR_COMMIT_EMAIL: ${{ env.AUR_COMMIT_EMAIL }}
          AUR_PAYLOAD_FILES: PKGBUILD .SRCINFO
        run: |
          set -euo pipefail
          bash scripts/publish_aur.sh

      - name: Commit and push metadata updates
        if: steps.check.outputs.changed == 'true'
        env:
          PKGVER: ${{ steps.update.outputs.pkgver }}
          PKGREL: ${{ steps.update.outputs.pkgrel }}
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git add PKGBUILD .SRCINFO upstream.sha256
          if git diff --cached --quiet; then
            echo "No staged changes to commit."
            exit 0
          fi
          git -c user.name="github-actions[bot]" \
              -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              commit -m "chore(update): rune-notes-bin ${PKGVER}-${PKGREL}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
